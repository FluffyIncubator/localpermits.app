<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalPermits.app</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="/static/js/heatmap.min.js"></script>
    <script src="/static/js/leaflet-heatmap.js"></script>

    <link rel="stylesheet" href="/css/main.css" />

    <style type="text/css">
        #historical-button {
            display: block;
            position: fixed;
            bottom: 2em;
            right: 1em;
            background-color: #333;
            padding: 1em;
            border-radius: 0.5em;
            border: 1px solid #0c0;
            z-index: 99999;
            color: #ccc;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="header">
        <a href="/">LocalPermits.app</a>
        <a href="sub.html"><small
                style="font-size: 16px; border: 1px solid #0c0; padding: 0.5em; margin: 0.5em; border-radius: 0.5em;">Manage
                Alerts</small></a>
    </div>
    <div id="map"></div>

    <div id="popup" class="curtain hidden">
        <div class="modal">
            <p>
                Click MANAGE ALERTS to set up demo alerts! You'll receive a text message when the system can detect a
                permit is issued near your home that may be related to demolition!
            </p>
            <button id="dismiss-popup">Dismiss</button>
        </div>
    </div>

    <a id="historical-button" href="/historical.html">View Historical Heatmap</a>

    <script type="text/javascript">
        async function main() {
            function getHeatmap(data) {
                var cfg = {
                    // radius should be small ONLY if scaleRadius is true (or small radius is intended)
                    "radius": 0.002,
                    "maxOpacity": .6,
                    // scales the radius based on map zoom
                    "scaleRadius": true,
                    // if set to false the heatmap uses the global maximum for colorization
                    // if activated: uses the data maximum within the current map boundaries 
                    //   (there will always be a red spot with useLocalExtremas true)
                    "useLocalExtrema": false,
                    // which field name in your data represents the latitude - default "lat"
                    latField: 'lat',
                    // which field name in your data represents the longitude - default "lng"
                    lngField: 'lng',
                    // which field name in your data represents the data value - default "value"
                    valueField: 'count'
                };

                var heatmapLayer = new HeatmapOverlay(cfg);
                heatmapLayer.setData({
                    max: 8,
                    data: data.rows
                });
                return heatmapLayer;
            }

            function CE(properties) {
                let el = document.createElement(properties.tagName);
                if (properties) {
                    if (properties.id) el.setAttribute('id', properties.id);
                    if (properties.classList) properties.classList.forEach(c => el.classList.add(c));
                    if (properties.text) el.appendChild(document.createTextNode(properties.text));
                    if (properties.children) properties.children.forEach(child => el.appendChild(child));
                }
                return el;
            }

            function runQuery(query) {
                return new Promise((resolve, reject) => {
                    let xhr = new XMLHttpRequest();
                    let url = 'https://phl.carto.com/api/v2/sql?q=' + encodeURIComponent(query.replace(/\n/ig, ' '));
                    console.log(url);
                    xhr.open('GET', url);
                    xhr.onload = function () {
                        let response = JSON.parse(this.responseText);
                        resolve(response);
                    }
                    xhr.send();
                });
            }

            async function getMapAccessToken() {
                const res = await fetch('/api/v1/mapbox-token');
                if (!res.ok) {
                    console.error('Failed to fetch map access token', res.status);
                    throw new Error('Failed to fetch map access token');
                }
                const data = await res.json();
                return data.accessToken || data.token;
            }

            async function getDemoPermits() {
                let permits = await runQuery(`
                    SELECT 
                        permitnumber,
                        permittype,
                        address,
                        status,
                        approvedscopeofwork,
                        permitissuedate,
                        st_y(the_geom) as lat,
                        st_x(the_geom) as lng,
                        (149000 - extract (epoch FROM current_date - permitissuedate)/3600) as count
                    FROM
                        permits
                    WHERE
                        (
                            status = 'ACTIVE'
			    OR status = 'Active'
			    OR status = 'Issued'
                            OR status = 'ISSUED'
                        )
                        AND (
                            permittype = 'DEMOLITION'
			    OR permittype = 'Demolition'
                            OR permittype = 'BP_DEMO'
                            OR approvedscopeofwork LIKE '%SEAL%LATERAL%'
                            OR approvedscopeofwork LIKE '%LATERAL%SEAL%'
			    OR approvedscopeofwork LIKE '%EARTH DISTURBANCE%'
                            OR approvedscopeofwork LIKE '%EXCAVATION%'
                            OR approvedscopeofwork LIKE '%SITE GRADING%'
                        )
                    ORDER BY
                            permitissuedate DESC
            `);

                let dustPermitsResponse = await fetch("/dustpermits.json");
                let dustPermits = await dustPermitsResponse.json();

                for (let d of dustPermits) {
                    if ((d.Status == 'Issued' || d.Status == 'Approved') && d.IssueDate.indexOf("2023") > -1) {
                        permits.rows.push({
                            permitnumber: d.PermitNumber,
                            permittype: "DUST CONTROL",
                            address: d.Address,
                            status: d.Status,
                            approvedscopeofwork: d.WorkDescription,
                            lat: d.Lat,
                            lng: d.Long,
                            count: 148000,
                            permitissuedate: d.IssueDate
                        })
                    }
                }
                
                return permits;
            }


            let dustIcon = L.icon({
                iconUrl: "/static/img/dust-control.png",
                shadowUrl: "/static/img/marker-shadow.png",
                iconSize: [25, 41],
                shadowSize: [41, 41],
                iconAnchor: [13, 41],
                shadowAnchor: [13, 40],
                popupAnchor: [0, -36]
            });

            let youIcon = L.icon({
                iconUrl: "/static/img/red-marker-icon.png",
                shadowUrl: "/static/img/marker-shadow.png",
                iconSize: [25, 41],
                shadowSize: [41, 41],
                iconAnchor: [13, 41],
                shadowAnchor: [13, 40],
                popupAnchor: [0, -36]
            });

            let homeIcon = L.icon({
                iconUrl: "/static/img/home-icon.png",
                shadowUrl: "/static/img/marker-shadow.png",
                iconSize: [25, 41],
                shadowSize: [41, 41],
                iconAnchor: [13, 41],
                shadowAnchor: [13, 40],
                popupAnchor: [0, -36]
            });

            let demoIcon = L.icon({
                iconUrl: "/static/img/demo-active.png",
                shadowUrl: "/static/img/marker-shadow.png",
                iconSize: [25, 41],
                shadowSize: [41, 41],
                iconAnchor: [13, 41],
                shadowAnchor: [13, 40],
                popupAnchor: [0, -36]
            });

            let plumbingIcon = L.icon({
                iconUrl: "/static/img/plumbing-active.png",
                shadowUrl: "/static/img/marker-shadow.png",
                iconSize: [25, 41],
                shadowSize: [41, 41],
                iconAnchor: [13, 41],
                shadowAnchor: [13, 40],
                popupAnchor: [0, -36]
            });

            let map = L.map('map').setView([39.952583, -75.165222], 15);

            const accessToken = await getMapAccessToken();

            L.tileLayer('https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token={accessToken}', {
                attribution: '© <a href="https://www.mapbox.com/about/maps/">Mapbox</a> © <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> <strong><a href="https://www.mapbox.com/map-feedback/" target="_blank">Improve this map</a></strong>',
                tileSize: 512,
                maxZoom: 18,
                zoomOffset: -1,
                id: 'mapbox/streets-v11',
                accessToken: accessToken
            }).addTo(map);

            let youMarker = null;

            function handleGpsUpdateSuccess(position) {
                if (youMarker) {
                    youMarker.removeFrom(map);
                }

                youMarker = L.marker([position.coords.latitude, position.coords.longitude], {
                    icon: youIcon
                }).addTo(map);

                map.setView([position.coords.latitude, position.coords.longitude], 17);
            }

            function handleGpsUpdateError(err) {
                console.log(err);
            };

            async function addHome() {
                let sessionId = localStorage.getItem('session_id');
                if (!sessionId) return;

                let res = await fetch(`/api/v1/sub/${sessionId}`);
                let data = await res.json();

                if (Math.abs(data.lat) > 0 && Math.abs(data.lng) > 0) {
                    L.circle([data.lat, data.lng], 400, {
                        color: 'green',
                        opacity: 0.25,
                        stroke: false
                    }).addTo(map);
                    L.marker([data.lat, data.lng], {
                        icon: homeIcon
                    }).addTo(map);
                }
            }

            // navigator.geolocation.getCurrentPosition(handleGpsUpdateSuccess, handleGpsUpdateError);

            let permits = await getDemoPermits();

            let locations = {};

            // if a permit is requested, find the corresponding popup and store it in this to pop it open when loading is done.
            let targetPermit = null;
            let requestedPermit = new URLSearchParams(window.location.search).get('p')

            permits.rows.forEach(permit => {
                if (!locations[permit.address]) locations[permit.address] = [];
                locations[permit.address].push(permit);
            })

            Object.keys(locations).forEach(address => {
                let permits = locations[address];
                let hasDemo = false;
                let hasPlumbing = false;
                let hasDust = false;

                let permitElements = permits.map(permit => {
                    if (permit.permittype.toUpperCase() == 'PLUMBING') hasPlumbing = true;
                    if (permit.permittype.toUpperCase().includes('DEMO')) hasDemo = true;
                    if (permit.permittype.toUpperCase() == 'DUST CONTROL') hasDust = true;

                    let children = [];

                    children.push(CE({
                        tagName: 'div',
                        text: `${permit.permitnumber} - ${permit.permittype} - ${permit.status}`,
                        classList: ['has-text-weight-bold']
                    }));

                    children.push(CE({
                        tagName: 'div',
                        text: `${permit.address}`,
                        classList: ['has-text-weight-bold']
                    }));

                    children.push(CE({
                        tagName: 'div',
                        text: `Issued: ${new Date(permit.permitissuedate).toLocaleDateString()}`
                    }));

                    if (permit.start_date) children.push(CE({
                        tagName: 'div',
                        text: `Started: ${new Date(permit.start_date).toLocaleDateString()}`
                    }));

                    if (permit.permittype == 'PLUMBING') children.push(CE({
                        tagName: 'div',
                        text: `Note: Plumbing permits that include sealing a lateral are a potential sign that a demolition will happen at this location.`,
                        classList: ['has-text-weight-bold']
                    }));

                    children.push(CE({
                        tagName: 'div',
                        text: `${permit.approvedscopeofwork ? permit.approvedscopeofwork : 'NO DESCRIPTION OF WORK PROVIDED'}`,
                        classList: [(permit.approvedscopeofwork ? 'has-text-weight-normal' : 'has-text-weight-bold')]
                    }));

                    let aiSummaryEl = CE({
                        tagName: 'div',
                        text: 'Loading AI summary…',
                        classList: ['ai-summary', 'has-text-weight-bold']
                    });
                    children.push(aiSummaryEl);

                    let permitDiv = CE({
                        tagName: 'div',
                        classList: ['permit'],
                        children: children
                    });
                    permitDiv.setAttribute('data-permitnumber', permit.permitnumber);
                    return permitDiv;
                });


                let link = document.createElement('a');
                link.classList.add('button', 'is-primary');
                link.href = `https://atlas.phila.gov/${encodeURIComponent(address)}/property`;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.innerHTML = 'Open in Atlas';
                permitElements.push(link);

                let popupElement = CE({
                    tagName: 'div',
                    classList: ['popup'],
                    children: permitElements
                });

                let permitsWithCoordinates = permits.filter(p => p.lat && p.lng);

                if (permitsWithCoordinates.length > 0) {
                    let icon = demoIcon;
                    if (hasPlumbing && !hasDemo && !hasDust) icon = plumbingIcon;
                    if (hasDust && !hasDemo) icon = dustIcon;

                    let thisMarker = L.marker([permitsWithCoordinates[0].lat, permitsWithCoordinates[0].lng], {
                        icon: icon
                    }).addTo(map).bindPopup(popupElement);

                    if (typeof requestedPermit != 'undefined') {
                        let matchingPermits = permitsWithCoordinates.filter(p => p.permitnumber == requestedPermit);
                        if (matchingPermits.length > 0) {
                            targetPermit = thisMarker;
                        }
                    }
                }
            });

            map.on('popupopen', async function (e) {
                let content = e.popup.getContent();
                if (!content || !content.querySelectorAll) return;
                let permitBlocks = content.querySelectorAll('.permit');
                for (let block of permitBlocks) {
                    let permitNumber = block.getAttribute('data-permitnumber');
                    if (!permitNumber) continue;
                    let aiEl = block.querySelector('.ai-summary');
                    if (!aiEl) continue;
                    try {
                        let res = await fetch('/api/v1/permit/' + encodeURIComponent(permitNumber));
                        if (!res.ok || !res.body) {
                            throw new Error('Bad response from server');
                        }
                        aiEl.textContent = 'AI SUMMARY: ';
                        const reader = res.body.getReader();
                        const decoder = new TextDecoder();
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            aiEl.textContent += decoder.decode(value, { stream: true });
                        }
                    } catch (err) {
                        console.error('AI summary fetch failed:', err);
                        aiEl.textContent = 'Summary unavailable';
                    }
                }
            });

            if (targetPermit) {
                map.setView(targetPermit.getLatLng(), 18);
                targetPermit.openPopup()
            }

            addHome();

            getHeatmap(permits).addTo(map);

        }

        main();

        function dismissPopup() {
            localStorage.setItem('popup-dismissed', 'true');
            document.getElementById('popup').classList.add('hidden');
            console.log('clicky clicky');
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('dismiss-popup').addEventListener('click', dismissPopup);

            let popupDismissed = localStorage.getItem('popup-dismissed');
            if (popupDismissed != 'true') {
                document.getElementById('popup').classList.remove('hidden');
            }
        })
    </script>
</body>

</html>
